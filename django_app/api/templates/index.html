<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Radio+Canada:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    /* CSS Variables */
    :root {
        --surface-0: #f5f5f5;
        --surface-1: #ffffff;
        --accent: hsl(220, 90%, 56%);
        --text-1: #222222;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: "Radio Canada", sans-serif;
        font-size: 1.125rem;
        line-height: 1.6;
        background-color: var(--surface-0);
        color: var(--text-1);
        padding-block-start: 10vb;
    }

    h1 {
        font-size: 4rem;
        font-weight: 300;
        line-height: 1;
        margin-bottom: 1.5rem;
    }

    a {
        color: hsl(from var(--accent) h s 80%);
    }

    label {
        text-transform: uppercase;
        font-size: 1rem;
    }

    .fine-print {
        font-size: 0.925rem;
        text-transform: revert;
        line-height: 1.4;
    }

    .contact-form {
        display: grid;
        gap: 1rem;
        background-color: var(--surface-1);
        padding: 3rem;
        border-radius: 24px;
        width: min(100% - 4rem, 1200px);
        margin-inline: auto;
    }

    input {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid #cccccc;
        border-radius: 8px;
        font-size: 1rem;
        font-family: "Radio Canada", sans-serif;
        color: var(--text-1);
    }

    input:focus {
        outline: none;
        border-color: var(--accent);
    }

    button {
        cursor: pointer;
        background-color: var(--accent);
        color: var(--text-1);
        padding: 1em 1.5em;
        border: 0;
        border-radius: 16px;
    }

    button:hover,
    button:focus-visible {
        background-color: hsl(from var(--accent) h s 30%);
    }

    .login-link {
        font-size: 0.925rem;
        text-align: center;
        color: var(--text-1);
    }
</style>    
</head>
<body>
        <form class="contact-form" method="POST" action="/api/register/">
            {% csrf_token %}
            <h1>Create Account</h1>

                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
        
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
            
            <button type="submit">Sign Up</button>
    
         <p class="fine-print login-link">
            Already have an account? <a href="/login/">Log in</a>
         </p>
    </form>         
</body>
</html>
