<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Radio+Canada:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-dark: #0d0d14;
        --surface: #1a1a2e;
        --card: #16213e;
        --accent-blue: #4a9eff;
        --accent-pink: #ff6b9d;
        --accent-cyan: #00d4ff;
        --accent-green: #00ff88;
        --accent-red: #ff4757;
        --accent-purp: #7c5cbf;
        --text: #ffffff;
        --text-dim: #8888aa;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: "Radio Canada", sans-serif;
        background-color: var(--bg-dark);
        color: var(--text);
        min-height: 100vh;
    }
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: flex; }
    .auth-screen { justify-content: center; align-items: center; padding: 2rem; }
    .auth-card {
        background: var(--surface);
        border-radius: 24px;
        padding: 3rem;
        width: min(100%, 480px);
        display: grid;
        gap: 1rem;
    }
    .auth-card h1 { font-size: 2.5rem; font-weight: 300; margin-bottom: 0.25rem; }
    .auth-card p { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 0.5rem; }
    label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); }
    input {
        width: 100%;
        padding: 12px 16px;
        background: var(--card);
        border: 1px solid #2a2a4a;
        border-radius: 10px;
        font-size: 1rem;
        font-family: "Radio Canada", sans-serif;
        color: var(--text);
        transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: var(--accent-blue); }
    .btn {
        cursor: pointer;
        padding: 14px 20px;
        border: 0;
        border-radius: 12px;
        font-size: 1rem;
        font-family: "Radio Canada", sans-serif;
        font-weight: 500;
        color: var(--text);
        transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent-blue); }
    .btn-secondary { background: #2a2a4a; }
    .btn-danger { background: var(--accent-red); }
    .btn-purple { background: var(--accent-purp); }
    .btn-sm { padding: 8px 14px; font-size: 0.85rem; border-radius: 8px; }
    .status { font-size: 0.9rem; min-height: 1.4em; text-align: center; }
    .status.error { color: var(--accent-red); }
    .status.success { color: var(--accent-green); }
    .status.info { color: var(--accent-cyan); }
    .link-row { text-align: center; font-size: 0.9rem; color: var(--text-dim); }
    .link-row a { color: var(--accent-blue); text-decoration: none; cursor: pointer; }

    /* DASHBOARD */
    .dashboard-screen { flex-direction: column; }
    .topbar {
        background: var(--surface);
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #2a2a4a;
    }
    .topbar h2 { font-size: 1.2rem; font-weight: 500; color: var(--accent-cyan); }
    .topbar-right { display: flex; gap: 0.75rem; align-items: center; }
    .username-badge { font-size: 0.85rem; color: var(--text-dim); }
    .main-content { padding: 2rem; max-width: 800px; margin: 0 auto; width: 100%; }
    .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
    }
    .section-header h3 { font-size: 1.4rem; font-weight: 400; }
    .event-card {
        background: var(--surface);
        border-radius: 16px;
        padding: 1.25rem 1.5rem;
        margin-bottom: 1rem;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1rem;
        border: 1px solid #2a2a4a;
        transition: border-color 0.2s;
    }
    .event-card:hover { border-color: #4a4a6a; }
    .event-info { flex: 1; }
    .event-title { font-size: 1.1rem; font-weight: 500; margin-bottom: 0.25rem; }
    .event-datetime { font-size: 0.85rem; color: var(--accent-cyan); margin-bottom: 0.25rem; }
    .event-desc { font-size: 0.85rem; color: var(--text-dim); }
    .event-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .no-events { text-align: center; color: var(--text-dim); padding: 3rem; font-size: 0.95rem; }

    /* PROFILE */
    .profile-card {
        background: var(--surface);
        border-radius: 16px;
        padding: 2rem;
        margin-bottom: 1rem;
        border: 1px solid #2a2a4a;
        display: grid;
        gap: 1.25rem;
    }
    .profile-field label { display: block; margin-bottom: 0.25rem; }
    .profile-field .value {
        font-size: 1.1rem;
        color: var(--text);
        padding: 10px 0;
        border-bottom: 1px solid #2a2a4a;
    }
    .profile-avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: var(--accent-purp);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        font-weight: 500;
        margin-bottom: 0.5rem;
    }

    /* MODAL */
    .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        justify-content: center;
        align-items: center;
        z-index: 100;
        padding: 1rem;
    }
    .modal-overlay.active { display: flex; }
    .modal {
        background: var(--surface);
        border-radius: 20px;
        padding: 2rem;
        width: min(100%, 480px);
        display: grid;
        gap: 1rem;
    }
    .modal h3 { font-size: 1.4rem; font-weight: 400; }
    .modal-actions { display: flex; gap: 0.75rem; }
    .modal-actions .btn { flex: 1; }
    .loading { text-align: center; color: var(--text-dim); padding: 2rem; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen auth-screen active" id="screen-login">
    <div class="auth-card">
        <div>
            <h1>Welcome Back</h1>
            <p>Sign in to continue</p>
        </div>
        <div>
            <label for="login-username">Username</label>
            <input type="text" id="login-username" placeholder="Enter your username" tabindex="1" autocomplete="username">
        </div>
        <div>
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Enter your password" tabindex="2" autocomplete="current-password">
        </div>
        <div class="status" id="login-status"></div>
        <button class="btn btn-primary" tabindex="3" onclick="doLogin()">Sign In</button>
        <div class="link-row">
            Don't have an account? <a onclick="showScreen('register')">Create Account</a>
        </div>
    </div>
</div>

<!-- REGISTER -->
<div class="screen auth-screen" id="screen-register">
    <div class="auth-card">
        <div>
            <h1>Create Account</h1>
            <p>Sign up to get started</p>
        </div>
        <div>
            <label for="reg-username">Username</label>
            <input type="text" id="reg-username" placeholder="Choose a username" tabindex="1" autocomplete="username">
        </div>
        <div>
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" placeholder="Choose a password" tabindex="2" autocomplete="new-password">
        </div>
        <div>
            <label for="reg-name">Full Name</label>
            <input type="text" id="reg-name" placeholder="Enter your full name" tabindex="3" autocomplete="name">
        </div>
        <div>
            <label for="reg-email">Email Address</label>
            <input type="email" id="reg-email" placeholder="Enter your email" tabindex="4" autocomplete="email">
        </div>
        <div>
            <label for="reg-phone">Phone Number</label>
            <input type="tel" id="reg-phone" placeholder="Enter your phone number" tabindex="5" autocomplete="tel">
        </div>
        <div class="status" id="register-status"></div>
        <button class="btn btn-primary" tabindex="6" onclick="doRegister()">Sign Up</button>
        <div class="link-row">
            Already have an account? <a onclick="showScreen('login')">Sign In</a>
        </div>
    </div>
</div>

<!-- EVENTS DASHBOARD -->
<div class="screen dashboard-screen" id="screen-dashboard">
    <div class="topbar">
        <h2>My Events</h2>
        <div class="topbar-right">
            <span class="username-badge" id="topbar-username"></span>
            <button class="btn btn-secondary btn-sm" onclick="showProfile()">👤 Profile</button>
            <button class="btn btn-secondary btn-sm" onclick="doLogout()">Logout</button>
        </div>
    </div>
    <div class="main-content">
        <div class="section-header">
            <h3 id="greeting">Good Morning</h3>
            <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Add Event</button>
        </div>
        <div id="events-list"><div class="loading">Loading events...</div></div>
    </div>
</div>

<!-- PROFILE SCREEN -->
<div class="screen dashboard-screen" id="screen-profile">
    <div class="topbar">
        <h2>My Profile</h2>
        <div class="topbar-right">
            <button class="btn btn-secondary btn-sm" onclick="showScreen('dashboard')">← Back to Events</button>
            <button class="btn btn-secondary btn-sm" onclick="doLogout()">Logout</button>
        </div>
    </div>
    <div class="main-content">
        <div class="section-header">
            <h3>Profile</h3>
            <button class="btn btn-purple btn-sm" onclick="openChangePasswordModal()">Change Password</button>
        </div>
        <div class="profile-card" id="profile-card">
            <div class="loading">Loading profile...</div>
        </div>
    </div>
</div>

<!-- ADD EVENT MODAL -->
<div class="modal-overlay" id="modal-add">
    <div class="modal">
        <h3>Add Event</h3>
        <div>
            <label for="add-title">Title</label>
            <input type="text" id="add-title" placeholder="Event title" tabindex="1">
        </div>
        <div>
            <label for="add-date">Date</label>
            <input type="date" id="add-date" tabindex="2">
        </div>
        <div>
            <label for="add-time">Time</label>
            <input type="time" id="add-time" tabindex="3">
        </div>
        <div>
            <label for="add-desc">Description</label>
            <input type="text" id="add-desc" placeholder="Optional description" tabindex="4">
        </div>
        <div class="status" id="add-status"></div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('modal-add')">Cancel</button>
            <button class="btn btn-primary" onclick="doAddEvent()">Save Event</button>
        </div>
    </div>
</div>

<!-- EDIT EVENT MODAL -->
<div class="modal-overlay" id="modal-edit">
    <div class="modal">
        <h3>Edit Event</h3>
        <div>
            <label for="edit-title">Title</label>
            <input type="text" id="edit-title" placeholder="Event title" tabindex="1">
        </div>
        <div>
            <label for="edit-date">Date</label>
            <input type="date" id="edit-date" tabindex="2">
        </div>
        <div>
            <label for="edit-time">Time</label>
            <input type="time" id="edit-time" tabindex="3">
        </div>
        <div>
            <label for="edit-desc">Description</label>
            <input type="text" id="edit-desc" placeholder="Optional description" tabindex="4">
        </div>
        <div class="status" id="edit-status"></div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('modal-edit')">Cancel</button>
            <button class="btn btn-purple" onclick="doEditEvent()">Save Changes</button>
        </div>
    </div>
</div>

<!-- CHANGE PASSWORD MODAL -->
<div class="modal-overlay" id="modal-change-password">
    <div class="modal">
        <h3>Change Password</h3>
        <div>
            <label for="old-password">Current Password</label>
            <input type="password" id="old-password" placeholder="Enter current password" tabindex="1">
        </div>
        <div>
            <label for="new-password">New Password</label>
            <input type="password" id="new-password" placeholder="Enter new password" tabindex="2">
        </div>
        <div>
            <label for="confirm-password">Confirm New Password</label>
            <input type="password" id="confirm-password" placeholder="Confirm new password" tabindex="3">
        </div>
        <div class="status" id="change-password-status"></div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('modal-change-password')">Cancel</button>
            <button class="btn btn-purple" onclick="doChangePassword()">Update Password</button>
        </div>
    </div>
</div>

<script>
    const BASE_URL = 'https://django-app-tnbd.onrender.com';
    let authToken = localStorage.getItem('authToken') || '';
    let currentUsername = localStorage.getItem('username') || '';
    let editingEventId = null;

    window.onload = () => {
        if (authToken) {
            showScreen('dashboard');
            loadEvents();
        } else {
            showScreen('login');
        }
        document.getElementById('login-password').addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
        });
        document.getElementById('reg-phone').addEventListener('keydown', e => {
            if (e.key === 'Enter') doRegister();
        });
    };

    function showScreen(name) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`screen-${name}`).classList.add('active');
    }

    function setStatus(id, msg, type) {
        const el = document.getElementById(id);
        el.textContent = msg;
        el.className = `status ${type}`;
    }

    async function doLogin() {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;
        if (!username || !password) {
            setStatus('login-status', 'Username and password are required.', 'error');
            return;
        }
        setStatus('login-status', 'Signing in…', 'info');
        try {
            const resp = await fetch(`${BASE_URL}/api/token/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await resp.json();
            if (resp.ok) {
                authToken = data.token;
                currentUsername = username;
                localStorage.setItem('authToken', authToken);
                localStorage.setItem('username', username);
                document.getElementById('topbar-username').textContent = username;
                setStatus('login-status', '', '');
                showScreen('dashboard');
                updateGreeting();
                loadEvents();
            } else {
                setStatus('login-status', 'Invalid credentials.', 'error');
            }
        } catch (e) {
            setStatus('login-status', 'Connection error.', 'error');
        }
    }

    async function doRegister() {
        const username = document.getElementById('reg-username').value.trim();
        const password = document.getElementById('reg-password').value.trim();
        const name     = document.getElementById('reg-name').value.trim();
        const email    = document.getElementById('reg-email').value.trim();
        const phone    = document.getElementById('reg-phone').value.trim();
        if (!username || !password) {
            setStatus('register-status', 'Username and password are required.', 'error');
            return;
        }
        setStatus('register-status', 'Creating account…', 'info');
        try {
            const resp = await fetch(`${BASE_URL}/api/register/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, name, email, phone })
            });
            const data = await resp.json();
            if (resp.ok) {
                authToken = data.token;
                currentUsername = username;
                localStorage.setItem('authToken', authToken);
                localStorage.setItem('username', username);
                document.getElementById('topbar-username').textContent = username;
                setStatus('register-status', '', '');
                showScreen('dashboard');
                updateGreeting();
                loadEvents();
            } else {
                setStatus('register-status', data.error || 'Registration failed.', 'error');
            }
        } catch (e) {
            setStatus('register-status', 'Connection error.', 'error');
        }
    }

    function doLogout() {
        authToken = '';
        currentUsername = '';
        localStorage.removeItem('authToken');
        localStorage.removeItem('username');
        showScreen('login');
    }

    function updateGreeting() {
        const hour = new Date().getHours();
        let greeting;
        if (hour < 12) greeting = 'Good Morning';
        else if (hour < 17) greeting = 'Good Afternoon';
        else greeting = 'Good Evening';
        const el = document.getElementById('greeting');
        if (el) el.textContent = `${greeting}, ${currentUsername}!`;
    }

    async function loadEvents() {
        document.getElementById('topbar-username').textContent = currentUsername;
        document.getElementById('events-list').innerHTML = '<div class="loading">Loading events...</div>';
        try {
            const resp = await fetch(`${BASE_URL}/api/events/`, {
                headers: { 'Authorization': `Token ${authToken}` }
            });
            const events = await resp.json();
            renderEvents(events);
        } catch (e) {
            document.getElementById('events-list').innerHTML = '<div class="no-events">Failed to load events.</div>';
        }
    }

    function formatDate(dateStr) {
        const [year, month, day] = dateStr.split('-');
        return `${month}/${day}/${year.slice(2)}`;
    }

    function formatTime(timeStr) {
        const [hourStr, min] = timeStr.split(':');
        let hour = parseInt(hourStr);
        const ampm = hour >= 12 ? 'PM' : 'AM';
        hour = hour % 12 || 12;
        return `${hour}:${min} ${ampm}`;
    }

    function renderEvents(events) {
        const list = document.getElementById('events-list');
        if (!events.length) {
            list.innerHTML = '<div class="no-events">No events yet. Click + Add Event to create one.</div>';
            return;
        }
        list.innerHTML = events.map(e => `
            <div class="event-card">
                <div class="event-info">
                    <div class="event-title">${e.title}</div>
                    <div class="event-datetime">${formatDate(e.date)} at ${formatTime(e.time)}</div>
                    ${e.description ? `<div class="event-desc">${e.description}</div>` : ''}
                </div>
                <div class="event-actions">
                    <button class="btn btn-purple btn-sm" onclick="openEditModal(${JSON.stringify(e).replace(/"/g, '&quot;')})">Edit</button>
                    <button class="btn btn-danger btn-sm" onclick="doDeleteEvent(${e.id})">Del</button>
                </div>
            </div>
        `).join('');
    }

    async function showProfile() {
        showScreen('profile');
        document.getElementById('profile-card').innerHTML = '<div class="loading">Loading profile...</div>';
        try {
            const resp = await fetch(`${BASE_URL}/api/users/`, {
                headers: { 'Authorization': `Token ${authToken}` }
            });
            const users = await resp.json();
            const user = users[0];
            if (user) {
                const initial = (user.name || currentUsername).charAt(0).toUpperCase();
                document.getElementById('profile-card').innerHTML = `
                    <div class="profile-avatar">${initial}</div>
                    <div class="profile-field">
                        <label>Full Name</label>
                        <div class="value">${user.name || '—'}</div>
                    </div>
                    <div class="profile-field">
                        <label>Email</label>
                        <div class="value">${user.email || '—'}</div>
                    </div>
                    <div class="profile-field">
                        <label>Phone</label>
                        <div class="value">${user.phone || '—'}</div>
                    </div>
                    <div class="profile-field">
                        <label>Member Since</label>
                        <div class="value">${new Date(user.date_registered).toLocaleDateString()}</div>
                    </div>
                `;
            }
        } catch (e) {
            document.getElementById('profile-card').innerHTML = '<div class="no-events">Failed to load profile.</div>';
        }
    }

    function openAddModal() {
        document.getElementById('add-title').value = '';
        document.getElementById('add-date').value = '';
        document.getElementById('add-time').value = '';
        document.getElementById('add-desc').value = '';
        setStatus('add-status', '', '');
        document.getElementById('modal-add').classList.add('active');
        document.getElementById('add-title').focus();
    }

    async function doAddEvent() {
        const title = document.getElementById('add-title').value.trim();
        const date  = document.getElementById('add-date').value;
        const time  = document.getElementById('add-time').value;
        const desc  = document.getElementById('add-desc').value.trim();
        if (!title || !date || !time) {
            setStatus('add-status', 'Title, date and time are required.', 'error');
            return;
        }
        setStatus('add-status', 'Saving…', 'info');
        try {
            const resp = await fetch(`${BASE_URL}/api/events/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Token ${authToken}`
                },
                body: JSON.stringify({ title, date, time: time + ':00', description: desc })
            });
            if (resp.ok) {
                closeModal('modal-add');
                loadEvents();
            } else {
                const data = await resp.json();
                setStatus('add-status', JSON.stringify(data), 'error');
            }
        } catch (e) {
            setStatus('add-status', 'Connection error.', 'error');
        }
    }

    function openEditModal(event) {
        editingEventId = event.id;
        document.getElementById('edit-title').value = event.title;
        document.getElementById('edit-date').value  = event.date;
        document.getElementById('edit-time').value  = event.time.substring(0, 5);
        document.getElementById('edit-desc').value  = event.description || '';
        setStatus('edit-status', '', '');
        document.getElementById('modal-edit').classList.add('active');
        document.getElementById('edit-title').focus();
    }

    async function doEditEvent() {
        const title = document.getElementById('edit-title').value.trim();
        const date  = document.getElementById('edit-date').value;
        const time  = document.getElementById('edit-time').value;
        const desc  = document.getElementById('edit-desc').value.trim();
        if (!title || !date || !time) {
            setStatus('edit-status', 'Title, date and time are required.', 'error');
            return;
        }
        setStatus('edit-status', 'Saving…', 'info');
        try {
            const resp = await fetch(`${BASE_URL}/api/events/${editingEventId}/`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Token ${authToken}`
                },
                body: JSON.stringify({ title, date, time: time + ':00', description: desc })
            });
            if (resp.ok) {
                closeModal('modal-edit');
                loadEvents();
            } else {
                const data = await resp.json();
                setStatus('edit-status', JSON.stringify(data), 'error');
            }
        } catch (e) {
            setStatus('edit-status', 'Connection error.', 'error');
        }
    }

    async function doDeleteEvent(id) {
        if (!confirm('Delete this event?')) return;
        try {
            const resp = await fetch(`${BASE_URL}/api/events/${id}/`, {
                method: 'DELETE',
                headers: { 'Authorization': `Token ${authToken}` }
            });
            if (resp.ok) loadEvents();
        } catch (e) {
            alert('Failed to delete event.');
        }
    }

    function openChangePasswordModal() {
        document.getElementById("old-password").value = "";
        document.getElementById("new-password").value = "";
        document.getElementById("confirm-password").value = "";
        setStatus("change-password-status", "", "");
        document.getElementById("modal-change-password").classList.add("active");
        document.getElementById("old-password").focus();
    }

    async function doChangePassword() {
        const oldPass     = document.getElementById("old-password").value;
        const newPass     = document.getElementById("new-password").value;
        const confirmPass = document.getElementById("confirm-password").value;
        if (!oldPass || !newPass || !confirmPass) {
            setStatus("change-password-status", "All fields are required.", "error");
            return;
        }
        if (newPass !== confirmPass) {
            setStatus("change-password-status", "New passwords do not match.", "error");
            return;
        }
        setStatus("change-password-status", "Updating password...", "info");
        try {
            const resp = await fetch(`${BASE_URL}/api/change-password/`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Token ${authToken}`
                },
                body: JSON.stringify({ old_password: oldPass, new_password: newPass })
            });
            const data = await resp.json();
            if (resp.ok) {
                authToken = data.token;
                localStorage.setItem("authToken", authToken);
                setStatus("change-password-status", "Password updated successfully!", "success");
                setTimeout(() => closeModal("modal-change-password"), 1500);
            } else {
                setStatus("change-password-status", data.error || "Failed to update password.", "error");
            }
        } catch (e) {
            setStatus("change-password-status", "Connection error.", "error");
        }
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('active');
    }

    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', e => {
            if (e.target === overlay) overlay.classList.remove('active');
        });
    });
</script>
</body>
</html>
